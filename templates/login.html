{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<style>
    .auth-page {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-container {
        width: 100%;
        max-width: 430px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #e5e7eb;
        padding: 36px;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
        text-align: center;
    }

    .auth-badge {
        display: inline-block;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: #2563eb;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 999px;
        margin-bottom: 16px;
    }

    .auth-title {
        font-size: 30px;
        font-weight: bold;
        color: #111827;
        margin-bottom: 8px;
    }

    .auth-subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 28px;
        line-height: 1.5;
    }

    .form-group {
        text-align: left;
        margin-bottom: 18px;
    }

    .form-group label {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        display: block;
        margin-bottom: 8px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        box-sizing: border-box;
        font-size: 14px;
        background: #ffffff;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input[type="text"]:focus,
    .form-group input[type="password"]:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
    }

    .remember-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .remember {
        display: flex;
        align-items: center;
        font-size: 14px;
        color: #4b5563;
    }

    .remember input {
        margin-right: 8px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #4facfe, #2563eb);
        color: white;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    .btn:hover {
        transform: translateY(-1px);
        opacity: 0.97;
    }

    .btn:active {
        transform: translateY(0);
    }

    .auth-footer {
        margin-top: 20px;
        font-size: 14px;
        color: #6b7280;
    }

    .auth-footer a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .error-message {
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
        padding: 12px 14px;
        border-radius: 10px;
        margin-bottom: 18px;
        font-size: 14px;
        text-align: left;
    }

    @media (max-width: 520px) {
        .auth-container {
            padding: 24px 18px;
            border-radius: 14px;
        }

        .auth-title {
            font-size: 26px;
        }

        .remember-row {
            align-items: flex-start;
        }
    }
</style>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-badge">Secure Access</div>
        <div class="auth-title">Welcome Back</div>
        <div class="auth-subtitle">Login to your account and continue where you left off.</div>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    id="username"
                    type="text"
                    name="username"
                    value="{{ request.form.get('username', '') }}"
                    required
                    autocomplete="username"
                    maxlength="30"
                    placeholder="Enter your username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    id="password"
                    type="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    placeholder="Enter your password"
                >
            </div>

            <div class="remember-row">
                <div class="remember">
                    <input
                        id="remember"
                        type="checkbox"
                        name="remember"
                        {% if request.form.get('remember') == 'on' %}checked{% endif %}
                    >
                    <label for="remember">Remember me</label>
                </div>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="auth-footer">
            Don’t have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </div>
    </div>
</div>

{% endblock %}
