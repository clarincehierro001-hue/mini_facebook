{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block head %}
<style>
    .auth-page {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 0;
    }

    .auth-card {
        width: 100%;
        max-width: 460px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.92));
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow-lg);
        padding: 34px;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(14px);
    }

    .auth-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 4px;
        background: linear-gradient(90deg, #60a5fa, var(--primary), #93c5fd);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 26px;
    }

    .auth-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--primary);
        background: var(--primary-soft);
        border: 1px solid rgba(96, 165, 250, 0.28);
        border-radius: 999px;
        margin-bottom: 16px;
    }

    .auth-badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.85;
    }

    .auth-title {
        margin: 0 0 10px;
        font-size: clamp(1.9rem, 3vw, 2.2rem);
        line-height: 1.1;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
    }

    .auth-subtitle {
        margin: 0;
        font-size: 0.98rem;
        line-height: 1.6;
        color: var(--text-muted);
    }

    .error-message {
        margin-bottom: 18px;
        padding: 13px 14px;
        border-radius: 14px;
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid var(--error-border);
        text-align: left;
        font-size: 0.95rem;
        line-height: 1.5;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        text-align: left;
    }

    .form-label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
    }

    .form-group label {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-soft);
    }

    .input-wrap {
        position: relative;
    }

    .form-input {
        width: 100%;
        min-height: 48px;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid var(--border-strong);
        background: var(--surface-solid);
        color: var(--text);
        font-size: 0.95rem;
        line-height: 1.4;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .form-input::placeholder {
        color: var(--text-muted);
    }

    .form-input:hover {
        border-color: #9ca3af;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
    }

    .remember-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: -2px;
    }

    .remember {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 0.95rem;
        color: var(--text-soft);
        cursor: pointer;
        user-select: none;
    }

    .remember input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
        margin: 0;
        cursor: pointer;
    }

    .btn {
        width: 100%;
        min-height: 50px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #60a5fa, var(--primary));
        color: #ffffff;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 0.01em;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 28px rgba(37, 99, 235, 0.28);
    }

    .btn:active {
        transform: translateY(0);
    }

    .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 6px 0 2px;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .auth-divider::before,
    .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    .auth-footer {
        margin-top: 8px;
        text-align: center;
        font-size: 0.96rem;
        color: var(--text-muted);
        line-height: 1.6;
    }

    .auth-footer a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    @media (prefers-color-scheme: dark) {
        .auth-card {
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.92), rgba(17, 24, 39, 0.84));
        }

        .form-input {
            background: rgba(15, 23, 42, 0.88);
        }

        .form-input:hover {
            border-color: rgba(255, 255, 255, 0.24);
        }

        .auth-card::before {
            background: linear-gradient(90deg, #60a5fa, #3b82f6, #93c5fd);
        }
    }

    @media (max-width: 560px) {
        .auth-page {
            min-height: auto;
        }

        .auth-card {
            padding: 24px 18px;
            border-radius: 20px;
        }

        .auth-header {
            margin-bottom: 22px;
        }

        .auth-title {
            font-size: 1.8rem;
        }

        .remember-row {
            align-items: flex-start;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <section class="auth-card" aria-labelledby="login-title">
        <div class="auth-header">
            <div class="auth-badge">
                <span class="auth-badge-dot" aria-hidden="true"></span>
                Secure Access
            </div>

            <h1 id="login-title" class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">
                Sign in to your account to continue where you left off.
            </p>
        </div>

        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <div class="form-label-row">
                    <label for="username">Username</label>
                </div>

                <div class="input-wrap">
                    <input
                        id="username"
                        class="form-input"
                        type="text"
                        name="username"
                        value="{{ request.form.get('username', '') }}"
                        required
                        autocomplete="username"
                        maxlength="30"
                        placeholder="Enter your username"
                        aria-required="true"
                    >
                </div>
            </div>

            <div class="form-group">
                <div class="form-label-row">
                    <label for="password">Password</label>
                </div>

                <div class="input-wrap">
                    <input
                        id="password"
                        class="form-input"
                        type="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Enter your password"
                        aria-required="true"
                    >
                </div>
            </div>

            <div class="remember-row">
                <label for="remember" class="remember">
                    <input
                        id="remember"
                        type="checkbox"
                        name="remember"
                        {% if request.form.get('remember') == 'on' %}checked{% endif %}
                    >
                    <span>Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="auth-divider">New here?</div>

            <div class="auth-footer">
                Don’t have an account?
                <a href="{{ url_for('register') }}">Create one</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
